<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Emergents - Ayurveda Nursing Academy (Demo)</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Emergents - Ayurveda Nursing Academy (Demo)</h1>
  </header>
  <main>
    <section id="courses">
      <h2>Courses</h2>
      <div id="courses-list">Loading courses...</div>
    </section>

    <section id="course-detail" class="hidden">
      <button id="back">← Back to courses</button>
      <h2 id="course-title"></h2>
      <p id="course-desc"></p>
      <h3>Lessons</h3>
      <ul id="lessons-list"></ul>
      <h3>Enroll</h3>
      <input id="userName" placeholder="Your name" />
      <button id="enroll">Enroll</button>
      <div id="enroll-result"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
